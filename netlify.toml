[build]
  base    = "artifacts/warriors-fitness"
  command = "npm install -g pnpm && pnpm install --no-frozen-lockfile && BASE_PATH=/ pnpm run build"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"
  BASE_PATH     = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
